name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.4.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# solution
        run: dotnet build --configuration Release

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test --logger "console;verbosity=detailed"

  game-launch-verify:
    name: game-launch-verify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          use-dotnet: true

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build C# assembly
        run: dotnet build src/CivGame/CivGame.csproj --configuration Debug --no-restore

      - name: Stage assembly for headless game mode
        run: |
          for dir in ExportDebug ExportRelease Release; do
            mkdir -p ".godot/mono/temp/bin/$dir"
            cp .godot/mono/temp/bin/Debug/CivGame.dll ".godot/mono/temp/bin/$dir/"
            cp .godot/mono/temp/bin/Debug/CivGame.pdb ".godot/mono/temp/bin/$dir/" 2>/dev/null || true
          done

      - name: Run game launch verify
        run: bash scripts/game-launch-verify.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check formatting
        run: dotnet format --verify-no-changes

  notify-failure:
    name: notify-failure
    runs-on: ubuntu-latest
    needs: [build, unit-tests, game-launch-verify, lint]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Open bug issue for main branch failure
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI regression] main broken at ${sha}`,
              body: `## CI failure on main\n\nCommit: ${context.sha}\nRun: ${runUrl}\n\nOne or more CI checks failed after merge to main. This needs immediate investigation.\n\n## Next steps\n1. Designer: triage and create a fix story\n2. Dispatcher: prioritize as critical`,
              labels: ['type:bug', 'priority:critical']
            });
