name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.4.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# solution
        run: dotnet build --configuration Release

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test --logger "console;verbosity=detailed"

  game-launch-verify:
    name: game-launch-verify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot (Mono)
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_mono_linux_x86_64.zip
          unzip -q Godot_v4.4.1-stable_mono_linux_x86_64.zip
          sudo mv Godot_v4.4.1-stable_mono_linux_x86_64/Godot_v4.4.1-stable_mono_linux.x86_64 /usr/local/bin/godot
          sudo mv Godot_v4.4.1-stable_mono_linux_x86_64/GodotSharp /usr/local/bin/GodotSharp
          chmod +x /usr/local/bin/godot

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build C# solution (ExportDebug — used by Godot headless without --editor)
        run: |
          mkdir -p .godot/mono/temp/bin/ExportDebug
          dotnet build src/CivGame/CivGame.csproj --configuration ExportDebug \
            -p:OutputPath="$(pwd)/.godot/mono/temp/bin/ExportDebug/"

      - name: Copy GodotSharp assemblies alongside CivGame.dll
        run: |
          GODOTSHARP=$(find /usr/local/bin/GodotSharp -name "GodotSharp.dll" -type f | head -1)
          if [ -z "$GODOTSHARP" ]; then
            echo "ERROR: GodotSharp.dll not found"; find /usr/local/bin/GodotSharp -type f | head -20; exit 1
          fi
          API_DEBUG="$(dirname $GODOTSHARP)"
          echo "Copying from: $API_DEBUG"
          cp "$API_DEBUG"/*.dll .godot/mono/temp/bin/ExportDebug/
          # Ensure GodotPlugins.dll is also available in Api/ExportDebug/ for Godot's internal host lookup
          sudo mkdir -p /usr/local/bin/GodotSharp/Api/ExportDebug
          sudo cp "$API_DEBUG"/*.dll /usr/local/bin/GodotSharp/Api/ExportDebug/

      - name: Diagnostic — GodotSharp installation structure
        run: |
          echo "=== GodotSharp dirs ==="
          find /usr/local/bin/GodotSharp -type d | sort
          echo "=== GodotPlugins.dll locations ==="
          find /usr/local/bin/GodotSharp -name "GodotPlugins.dll" | sort
          echo "=== Project bin dir ==="
          find .godot/mono/temp/bin/ -type f | sort

      - name: Run game launch verify
        env:
          TIMEOUT: "30"
        run: bash scripts/game-launch-verify.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check formatting
        run: dotnet format --verify-no-changes

  notify-failure:
    name: notify-failure
    runs-on: ubuntu-latest
    needs: [build, unit-tests, game-launch-verify, lint]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Open bug issue for main branch failure
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI regression] main broken at ${sha}`,
              body: `## CI failure on main\n\nCommit: ${context.sha}\nRun: ${runUrl}\n\nOne or more CI checks failed after merge to main. This needs immediate investigation.\n\n## Next steps\n1. Designer: triage and create a fix story\n2. Dispatcher: prioritize as critical`,
              labels: ['type:bug', 'priority:critical']
            });
